<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{{ title }} - Paperfile</title>
    <style>
        body { font-family: Arial, sans-serif; background: #a6caf0; margin: 0; padding: 28px 40px; max-width: 720px; }
        h1 { margin-top: 0; }
        p { font-size: 18px; line-height: 1.5; }
        code { background: rgba(255,255,255,0.5); padding: 2px 6px; }
        a { font-size: 18px; }
    </style>
</head>
<body>
    <p><a href="{{ url_for('generate_reports') }}">&larr; Generate Reports</a></p>
    <h1>{{ title }}</h1>
    <p>Not implemented in the web app yet. Desktop module: <code>{{ desktop_module }}</code></p>
    {% if note %}<p>{{ note }}</p>{% endif %}
</body>
</html>
