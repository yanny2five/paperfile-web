<!DOCTYPE html>
<html lang="en" class="pf-ui-{{ ui_theme }}">
<head>
    <meta charset="utf-8">
    {% include '_ui_head.html' %}
    <title>{{ title }} - Paperfile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #b8d3f0;
            margin: 0;
            padding: 28px 40px;
            max-width: 800px;
        }
        h1 { font-size: 32px; margin-top: 0; }
        .meta { font-size: 16px; color: #333; margin-bottom: 20px; }
        .body { font-size: 18px; line-height: 1.55; }
        a.back {
            display: inline-block;
            margin-top: 28px;
            font-size: 18px;
            color: #0645ad;
        }
    </style>
</head>
<body>


    

<h1>{{ title }}</h1>
    <div class="body">
        {% for line in description_lines %}
            <p>{{ line }}</p>
        {% endfor %}
    </div>
    <a class="back" href="{{ url_for('dashboard') }}">&larr; Main menu</a>
</body>
</html>
