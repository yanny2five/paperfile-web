<!DOCTYPE html>
<html>
<head>
    <title>Paperfile Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #b8d3f0;
            margin: 0;
            padding: 28px 40px;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 24px;
            font-size: 44px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
            align-items: start;
        }

        .radio-group label,
        .checkbox-group label,
        .sort-group label {
            display: block;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 14px;
        }

        .sort-group {
            margin-top: 10px;
            margin-left: 34px;
        }

        .sort-group-title {
            font-size: 20px;
            margin-bottom: 6px;
        }

        .sort-group label {
            font-weight: 400;
            font-size: 18px;
            margin-bottom: 6px;
        }

        .field-panel {
            margin-bottom: 18px;
        }

        .field-row {
            display: none;
            grid-template-columns: 380px 300px;
            align-items: center;
            gap: 20px;
            margin-bottom: 14px;
        }

        .field-row.active {
            display: grid;
        }

        .field-row label {
            font-size: 18px;
            font-weight: 700;
        }

        input[type="text"],
        input[type="number"],
        select {
            font-size: 18px;
            padding: 8px 10px;
            width: 100%;
            box-sizing: border-box;
        }

        .small-input {
            width: 160px;
        }

        .checkbox-group {
            margin-top: 18px;
        }

        .checkbox-group label {
            font-weight: 400;
            font-size: 18px;
        }

        .vita-box {
            display: none;
            margin-top: 14px;
            margin-left: 26px;
            padding: 12px 14px;
            background: rgba(255,255,255,0.25);
            border-radius: 8px;
        }

        .vita-box.show {
            display: block;
        }

        .vita-box label {
            display: inline-block;
            margin-right: 16px;
            margin-bottom: 10px;
            font-size: 17px;
            font-weight: 400;
        }

        .button-row {
            margin-top: 28px;
        }

        button {
            font-size: 20px;
            padding: 12px 28px;
            margin-right: 14px;
            cursor: pointer;
        }

        hr {
            margin: 34px 0 24px 0;
            border: none;
            border-top: 1px solid rgba(0,0,0,0.2);
        }

        h2 {
            font-size: 34px;
            margin-bottom: 18px;
        }

        .result {
            background: rgba(255,255,255,0.6);
            border: 1px solid rgba(0,0,0,0.15);
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 12px;
            font-size: 18px;
            line-height: 1.5;
        }

        .muted {
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h1>Paperfile Search</h1>

    <form method="POST">
        <div class="main-grid">
            <div>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="search_type" value="number"
                            {% if request.form.get('search_type', 'author_title') == 'number' %}checked{% endif %}>
                        Select by Number
                    </label>

                    <label>
                        <input type="radio" name="search_type" value="multiple_numbers"
                            {% if request.form.get('search_type') == 'multiple_numbers' %}checked{% endif %}>
                        Select multiple papers by Number
                    </label>

                    <label>
                        <input type="radio" name="search_type" value="vita_type"
                            {% if request.form.get('search_type') == 'vita_type' %}checked{% endif %}>
                        Select by Vita Type
                    </label>

                    <label>
                        <input type="radio" name="search_type" value="year"
                            {% if request.form.get('search_type') == 'year' %}checked{% endif %}>
                        Select by Year
                    </label>

                    <label>
                        <input type="radio" name="search_type" value="author_title"
                            {% if request.form.get('search_type', 'author_title') == 'author_title' %}checked{% endif %}>
                        Select by Author and/or Title
                    </label>

                    <label>
                        <input type="radio" name="search_type" value="keyword"
                            {% if request.form.get('search_type') == 'keyword' %}checked{% endif %}>
                        Select by keyword
                    </label>

                    <label>
                        <input type="radio" name="search_type" value="journal_book"
                            {% if request.form.get('search_type') == 'journal_book' %}checked{% endif %}>
                        Select by book or journal title
                    </label>

                    <label>
                        <input type="radio" name="search_type" value="any_field"
                            {% if request.form.get('search_type') == 'any_field' %}checked{% endif %}>
                        Select for text in any field
                    </label>
                </div>

                <div class="sort-group">
                    <div class="sort-group-title">Sort by</div>

                    <label>
                        <input type="radio" name="sort_by" value="number"
                            {% if request.form.get('sort_by') == 'number' %}checked{% endif %}>
                        number
                    </label>

                    <label>
                        <input type="radio" name="sort_by" value="author"
                            {% if request.form.get('sort_by') == 'author' %}checked{% endif %}>
                        author
                    </label>

                    <label>
                        <input type="radio" name="sort_by" value="title"
                            {% if request.form.get('sort_by', 'title') == 'title' %}checked{% endif %}>
                        title
                    </label>

                    <label>
                        <input type="radio" name="sort_by" value="vita_type"
                            {% if request.form.get('sort_by') == 'vita_type' %}checked{% endif %}>
                        vita type
                    </label>

                    <label>
                        <input type="radio" name="sort_by" value="journal_book"
                            {% if request.form.get('sort_by') == 'journal_book' %}checked{% endif %}>
                        journal/book
                    </label>
                </div>

                <div class="checkbox-group" style="margin-top:24px;">
                    <label>
                        <input type="checkbox" name="italics"
                            {% if request.form.get('italics') %}checked{% endif %}>
                        Put titles in Italics
                    </label>

                    <label>
                        <input type="checkbox" name="omit_number"
                            {% if request.form.get('omit_number') %}checked{% endif %}>
                        Omit number
                    </label>

                    <label>
                        <input type="checkbox" name="omit_keywords"
                            {% if request.form.get('omit_keywords') %}checked{% endif %}>
                        Omit keywords
                    </label>
                </div>
            </div>

            <div>
                <div class="field-panel">
                    <div class="field-row mode-author_title mode-any_field active-field-target">
                        <label for="query">Text to find</label>
                        <input type="text" id="query" name="query_author_title" value="{{ request.form.get('query_author_title', '') }}">
                    </div>

                    <div class="field-row mode-number active-field-target">
                        <label for="number_query">Paper number</label>
                        <input type="text" id="number_query" name="query_number" value="{{ request.form.get('query_number', '') }}" placeholder="e.g., 10">
                    </div>

                    <div class="field-row mode-multiple_numbers active-field-target">
                        <label for="multiple_numbers_query">Numbers (comma separated)</label>
                        <input type="text" id="multiple_numbers_query" name="query_multiple_numbers" placeholder="74, 312, 708" value="{{ request.form.get('query_multiple_numbers', '') }}">
                    </div>

                    <div class="field-row mode-vita_type active-field-target">
                        <label for="vita_query">Text to find in Vita Type</label>
                        <input type="text" id="vita_query" name="query_vita_type" value="{{ request.form.get('query_vita_type', '') }}">
                    </div>

                    <div class="field-row mode-year active-field-target">
                        <label for="year_query">Year</label>
                        <input type="text" id="year_query" name="query_year" value="{{ request.form.get('query_year', '') }}">
                    </div>

                    <div class="field-row mode-keyword active-field-target">
                        <label for="keyword_query">Text to find in Keyword field</label>
                        <input type="text" id="keyword_query" name="query_keyword" value="{{ request.form.get('query_keyword', '') }}">
                    </div>

                    <div class="field-row mode-journal_book active-field-target">
                        <label for="journal_query">Text to find in Journal/Book field</label>
                        <input type="text" id="journal_query" name="query_journal_book" value="{{ request.form.get('query_journal_book', '') }}">
                    </div>

                    <div class="field-row mode-author_title active-field-target">
                        <label for="author_query">Text to find in Author field</label>
                        <input type="text" id="author_query" name="author_query" value="{{ request.form.get('author_query', request.form.get('query', '')) }}">
                    </div>

                    <div class="field-row mode-author_title active-field-target">
                        <label for="title_query">Text to find in Title field</label>
                        <input type="text" id="title_query" name="title_query" value="{{ request.form.get('title_query', '') }}">
                    </div>

                    <div class="field-row mode-author_title mode-keyword mode-journal_book mode-any_field active-field-target">
                        <label for="year_min">First Year wanted</label>
                        <input class="small-input" type="number" id="year_min" name="year_min" value="{{ request.form.get('year_min', '') }}">
                    </div>

                    <div class="field-row mode-author_title mode-keyword mode-journal_book mode-any_field active-field-target">
                        <label for="year_max">Last Year wanted</label>
                        <input class="small-input" type="number" id="year_max" name="year_max" value="{{ request.form.get('year_max', '') }}">
                    </div>
                </div>

                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" id="restrict_vita_types" name="restrict_vita_types"
                            {% if request.form.get('restrict_vita_types') %}checked{% endif %}>
                        Restrict vita types
                    </label>
                </div>

                <div id="vita-box" class="vita-box {% if request.form.get('restrict_vita_types') %}show{% endif %}">
                    <label><input type="checkbox" name="vita_types" value="journal"
                        {% if 'journal' in request.form.getlist('vita_types') %}checked{% endif %}> Journal</label>

                    <label><input type="checkbox" name="vita_types" value="book"
                        {% if 'book' in request.form.getlist('vita_types') %}checked{% endif %}> Book</label>

                    <label><input type="checkbox" name="vita_types" value="conference"
                        {% if 'conference' in request.form.getlist('vita_types') %}checked{% endif %}> Conference</label>

                    <label><input type="checkbox" name="vita_types" value="report"
                        {% if 'report' in request.form.getlist('vita_types') %}checked{% endif %}> Report</label>
                </div>
            </div>
        </div>

        <div class="button-row">
            <button type="submit">Retrieve</button>
            <button type="button" onclick="window.location='/'">Done</button>
        </div>
    </form>

    <hr>

    <h2>Results</h2>

    {% if formatted_results %}
        {% for r in formatted_results %}
            <div class="result">{{ r | safe }}</div>
        {% endfor %}
    {% else %}
        <div class="muted">No results yet.</div>
    {% endif %}

    <script>
        function updateVisibleFields() {
            const selected = document.querySelector('input[name="search_type"]:checked');
            const mode = selected ? selected.value : 'author_title';

            console.log('Switching to mode:', mode);

            // Remove active from ALL field rows first
            document.querySelectorAll('.field-row').forEach(el => {
                el.classList.remove('active');
            });

            // Add active only to matching fields
            document.querySelectorAll('.mode-' + mode).forEach(el => {
                el.classList.add('active');
                console.log('Activated field:', el.querySelector('input')?.id || 'unknown');
            });
        }

        function updateVitaBox() {
            const box = document.getElementById('vita-box');
            const checked = document.getElementById('restrict_vita_types').checked;

            if (checked) {
                box.classList.add('show');
            } else {
                box.classList.remove('show');
            }
        }

        // Ensure form submission includes correct search_type
        document.querySelector('form').addEventListener('submit', function(e) {
            // Ensure a search type is always selected
            const selectedSearchType = document.querySelector('input[name="search_type"]:checked');
            if (!selectedSearchType) {
                document.querySelector('input[name="search_type"][value="author_title"]').checked = true;
            }

            const searchType = document.querySelector('input[name="search_type"]:checked').value;
            console.log('Form submitting with search_type:', searchType);
        });

        document.querySelectorAll('input[name="search_type"]').forEach(radio => {
            radio.addEventListener('change', updateVisibleFields);
        });

        document.getElementById('restrict_vita_types').addEventListener('change', updateVitaBox);

        updateVisibleFields();
        updateVitaBox();
    </script>
</body>
</html>
