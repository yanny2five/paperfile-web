<form id="main-search-form" method="POST" action="{{ search_form_action }}">
        <div class="main-grid">
            <section class="form-section">
                <h3>Search options</h3>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="search_type" value="vita_type"
                            {% if search_type_display == 'vita_type' %}checked{% endif %}>
                        Select by Vita Type
                    </label>

                    <label>
                        <input type="radio" name="search_type" value="year"
                            {% if search_type_display == 'year' %}checked{% endif %}>
                        Select by Year
                    </label>

                    <label>
                        <input type="radio" name="search_type" value="author_title"
                            {% if search_type_display == 'author_title' %}checked{% endif %}>
                        Select by Author and/or Title
                    </label>

                    <label>
                        <input type="radio" name="search_type" value="keyword"
                            {% if search_type_display == 'keyword' %}checked{% endif %}>
                        Select by keyword
                    </label>

                    <label>
                        <input type="radio" name="search_type" value="journal_book"
                            {% if search_type_display == 'journal_book' %}checked{% endif %}>
                        Select by book or journal title
                    </label>

                    <label>
                        <input type="radio" name="search_type" value="any_field"
                            {% if search_type_display == 'any_field' %}checked{% endif %}>
                        Select for text in any field
                    </label>
                </div>

                <div class="sort-group">
                    <div class="sort-group-title">Sort by</div>

                    {% set _sort_by = request.form.get('sort_by', sort_by|default('vita_type')) %}
                    <label>
                        <input type="radio" name="sort_by" value="author"
                            {% if _sort_by == 'author' %}checked{% endif %}>
                        author
                    </label>

                    <label>
                        <input type="radio" name="sort_by" value="title"
                            {% if _sort_by == 'title' %}checked{% endif %}>
                        title
                    </label>

                    <label>
                        <input type="radio" name="sort_by" value="vita_type"
                            {% if _sort_by == 'vita_type' %}checked{% endif %}>
                        vita type
                    </label>

                    <label>
                        <input type="radio" name="sort_by" value="journal_book"
                            {% if _sort_by == 'journal_book' %}checked{% endif %}>
                        journal/book
                    </label>
                </div>

                <div class="checkbox-group" style="margin-top:24px;">
                    <label>
                        <input type="checkbox" name="italics"
                            {% if request.form.get('italics') %}checked{% endif %}>
                        Put titles in Italics
                    </label>

                    <label>
                        <input type="checkbox" name="omit_keywords"
                            {% if request.form.get('omit_keywords') %}checked{% endif %}>
                        Omit keywords
                    </label>
                </div>
            </section>

            <section class="form-section">
                <h3>Filters</h3>
                <div class="field-panel">
                    <div class="field-row mode-keyword active-field-target">
                        <label for="keyword_query">Text in Keyword fields</label>
                        <input type="text" id="keyword_query" name="query_keyword" value="{{ request.form.get('query_keyword', '') }}">
                    </div>

                    <div class="field-row mode-journal_book active-field-target">
                        <label for="journal_query">Text in Book/Journal field</label>
                        <input type="text" id="journal_query" name="query_journal_book" value="{{ request.form.get('query_journal_book', '') }}">
                    </div>

                    <div class="field-row mode-any_field active-field-target">
                        <label for="anyfield_query">Text in any field</label>
                        <input type="text" id="anyfield_query" name="query_any_field" value="{{ request.form.get('query_any_field', request.form.get('query_author_title', '')) }}">
                    </div>

                    <div class="field-row mode-author_title active-field-target">
                        <label for="author_query">Text to find in Author field</label>
                        <input type="text" id="author_query" name="author_query" value="{{ request.form.get('author_query', '') }}">
                    </div>

                    <div class="field-row mode-author_title active-field-target">
                        <label for="optional_author_query">Optional more text in Author</label>
                        <input type="text" id="optional_author_query" name="optional_author_query" value="{{ request.form.get('optional_author_query', '') }}">
                    </div>

                    <div class="field-row mode-author_title active-field-target">
                        <label for="title_query">Text to find in Title field</label>
                        <input type="text" id="title_query" name="title_query" value="{{ request.form.get('title_query', '') }}">
                    </div>

                    <div class="field-row mode-author_title active-field-target">
                        <label for="optional_title_query">Optional more text in Title</label>
                        <input type="text" id="optional_title_query" name="optional_title_query" value="{{ request.form.get('optional_title_query', '') }}">
                    </div>

                    <div class="field-row mode-vita_type mode-year mode-author_title mode-keyword mode-journal_book mode-any_field active-field-target">
                        <label for="year_min">First Year wanted</label>
                        <input class="small-input" type="number" id="year_min" name="year_min" value="{{ request.form.get('year_min', year_min|default('')) }}">
                    </div>

                    <div class="field-row mode-vita_type mode-year mode-author_title mode-keyword mode-journal_book mode-any_field active-field-target">
                        <label for="year_max">Last Year wanted</label>
                        <input class="small-input" type="number" id="year_max" name="year_max" value="{{ request.form.get('year_max', year_max|default('')) }}">
                    </div>
                </div>

                <div class="retrieve-vita-desktop">
                    <div class="checkbox-group restrict-vita-top">
                        <label class="restrict-vita-label">
                            <input type="checkbox" id="restrict_vita_types" name="restrict_vita_types"
                                {% if request.form.get('restrict_vita_types') or search_type_display == 'vita_type' %}checked{% endif %}>
                            Restrict vita types
                        </label>
                    </div>

                    <div id="vita-box" class="vita-box vita-box-desktop {% if request.form.get('restrict_vita_types') or search_type_display == 'vita_type' %}show{% endif %}">
                        <div class="vita-desktop-toolbar">
                            <span class="vita-desktop-heading">Check vita types to INCLUDE</span>
                            <span class="vita-desktop-btns">
                                <button type="button" id="vita_select_all" class="vita-desktop-btn">Select All</button>
                                <button type="button" id="vita_unselect_all" class="vita-desktop-btn">Unselect All</button>
                            </span>
                        </div>
                        <div class="vita-desktop-grid">
                            {% for code, name in vita_type_pairs %}
                            <label class="vita-desktop-row">
                                <input type="checkbox" name="vita_types" value="{{ code }}"
                                    {% if code in request.form.getlist('vita_types') %}checked{% endif %}>
                                <span class="vita-desktop-name">{{ name }}</span>
                            </label>
                            {% endfor %}
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <div class="button-row">
            <button type="submit">{{ search_submit_label }}</button>
            <button type="button" onclick="window.location='{{ done_href }}'">Done</button>
        </div>
    </form>

    <script>
        function updateVisibleFields() {
            const selected = document.querySelector('input[name="search_type"]:checked');
            const mode = selected ? selected.value : 'author_title';

            document.querySelectorAll('.field-row').forEach(el => {
                el.classList.remove('active');
            });

            document.querySelectorAll('.mode-' + mode).forEach(el => {
                el.classList.add('active');
            });
        }

        function updateVitaBox() {
            const box = document.getElementById('vita-box');
            const checked = document.getElementById('restrict_vita_types').checked;
            if (checked) {
                box.classList.add('show');
            } else {
                box.classList.remove('show');
            }
        }

        function setAllVitaChecks(value) {
            document
                .querySelectorAll('#vita-box input[type="checkbox"][name="vita_types"]')
                .forEach(cb => { cb.checked = value; });
        }

        document.getElementById('main-search-form').addEventListener('submit', function(e) {
            const selectedSearchType = document.querySelector('input[name="search_type"]:checked');
            if (!selectedSearchType) {
                document.querySelector('input[name="search_type"][value="author_title"]').checked = true;
            }
        });

        document.querySelectorAll('input[name="search_type"]').forEach(radio => {
            radio.addEventListener('change', function () {
                updateVisibleFields();
                // Auto-show the vita-restrict checklist when "Select by Vita Type"
                // is chosen (mirrors desktop's combined vita-radio + year layout).
                if (this.value === 'vita_type') {
                    const cb = document.getElementById('restrict_vita_types');
                    if (!cb.checked) {
                        cb.checked = true;
                        updateVitaBox();
                    }
                }
            });
        });

        document.getElementById('restrict_vita_types').addEventListener('change', updateVitaBox);
        document.getElementById('vita_select_all').addEventListener('click', function () { setAllVitaChecks(true); });
        document.getElementById('vita_unselect_all').addEventListener('click', function () { setAllVitaChecks(false); });

        updateVisibleFields();
        updateVitaBox();
    </script>
