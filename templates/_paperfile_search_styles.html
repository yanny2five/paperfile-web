<style>
        body {
            font-family: "Segoe UI", Tahoma, Arial, sans-serif;
            background: #edf2f7;
            margin: 0;
            padding: clamp(8px, 1.4vw, 18px);
            box-sizing: border-box;
            max-width: 100%;
            overflow-x: hidden;
            color: #1f2937;
            font-size: 17px;
            line-height: 1.5;
        }

        .page-shell {
            max-width: 1180px;
            margin: 0 auto;
            width: min(100%, 1180px);
        }

        .page-header {
            margin-bottom: 14px;
        }

        .menu-link-wrap {
            margin: 0 0 12px 0;
        }

        .menu-link {
            font-size: 15px;
            color: #1d4f91;
            text-decoration: none;
            font-weight: 600;
        }

        .menu-link:hover {
            text-decoration: underline;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 0;
            font-size: clamp(30px, 3.4vw, 40px);
            font-weight: 700;
        }

        .main-grid {
            display: grid;
            grid-template-columns: minmax(280px, 0.9fr) minmax(420px, 1.1fr);
            gap: clamp(20px, 2.6vw, 34px);
            align-items: start;
            max-width: 100%;
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .section-card,
        .results-section {
            background: #ffffff;
            border: 1px solid #d9e2ec;
            border-radius: 12px;
            padding: clamp(16px, 1.8vw, 26px);
            box-shadow: 0 2px 7px rgba(15, 23, 42, 0.06);
            margin-bottom: 16px;
        }

        .form-section h3 {
            margin: 0 0 12px 0;
            font-size: 19px;
            font-weight: 700;
            color: #334155;
        }

        .radio-group label,
        .checkbox-group label,
        .sort-group label {
            display: block;
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .sort-group {
            margin-top: 14px;
            margin-left: 18px;
        }

        .sort-group-title {
            font-size: 17px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .sort-group label {
            font-weight: 400;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .field-panel {
            margin-bottom: 14px;
        }

        .field-row {
            display: none;
            grid-template-columns: minmax(170px, 0.8fr) minmax(220px, 1.2fr);
            align-items: center;
            gap: 8px 14px;
            margin-bottom: 10px;
            max-width: 100%;
        }

        .field-row.active {
            display: grid;
        }

        .field-row label {
            font-size: 15px;
            font-weight: 600;
            color: #475569;
        }

        input[type="text"],
        input[type="number"],
        select {
            font-size: 16px;
            padding: 10px 11px;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            background: #fff;
        }

        .small-input {
            width: 180px;
            max-width: 100%;
        }

        .checkbox-group {
            margin-top: 14px;
        }

        .checkbox-group label {
            font-weight: 400;
            font-size: 16px;
        }

        .vita-box {
            display: none;
            margin-top: 10px;
            margin-left: 14px;
            padding: 10px 12px;
            background: #f8fafc;
            border-radius: 6px;
            border: 1px solid #dbe5ef;
        }

        .vita-box.show {
            display: block;
        }

        .vita-box label {
            display: inline-block;
            margin-right: 16px;
            margin-bottom: 8px;
            font-size: 15px;
            font-weight: 400;
        }

        /* Restrict vita block: white grooved inner panel + 3-col grid (no full-width blue wrapper) */
        .retrieve-vita-desktop {
            background: transparent;
            margin-top: 18px;
            margin-left: 0;
            margin-right: 0;
            padding: 0;
            border-radius: 0;
            box-sizing: border-box;
            max-width: 100%;
        }

        .retrieve-vita-desktop .restrict-vita-top {
            margin-top: 0;
        }

        .restrict-vita-label {
            font-size: 15px;
            font-weight: 700;
            font-family: "Segoe UI", "Microsoft YaHei UI", "Microsoft YaHei", sans-serif;
        }

        .retrieve-vita-desktop .vita-box-desktop {
            margin-left: 0;
            margin-top: 10px;
            padding: 10px 12px 14px;
            background: #ffffff;
            border: 2px groove #9aa7b8;
            border-radius: 0;
            box-sizing: border-box;
        }

        .vita-desktop-toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 8px 12px;
            margin-bottom: 10px;
        }

        .vita-desktop-heading {
            font-size: 15px;
            font-weight: 700;
            font-family: "Segoe UI", "Microsoft YaHei UI", "Microsoft YaHei", sans-serif;
        }

        .vita-desktop-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .vita-desktop-btn {
            font-size: 12px;
            padding: 6px 12px;
            min-width: 76px;
            background: #d1d5db;
            border: 2px outset #e5e7eb;
            border-radius: 2px;
            color: #111827;
            font-weight: 600;
        }

        .vita-desktop-btn:active {
            border-style: inset;
        }

        .vita-desktop-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            column-gap: 10px;
            row-gap: 4px;
            align-items: start;
        }

        .vita-desktop-row {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin: 0;
            font-size: 14px;
            font-weight: 400;
            font-family: "Segoe UI", "Microsoft YaHei UI", "Microsoft YaHei", sans-serif;
        }

        .vita-desktop-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            flex-shrink: 0;
        }

        .vita-desktop-name {
            line-height: 1.35;
        }

        @media (max-width: 720px) {
            .vita-desktop-grid {
                grid-template-columns: 1fr;
            }

            .vita-desktop-toolbar {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        /* Themed shells: keep grooved white vita panel; no outer blue fill */
        html.pf-ui-soft .retrieve-vita-desktop .vita-box-desktop,
        html.pf-ui-pop .retrieve-vita-desktop .vita-box-desktop,
        html.pf-ui-modern .retrieve-vita-desktop .vita-box-desktop {
            border: 2px groove #9aa7b8 !important;
            background: #ffffff !important;
            border-radius: 0 !important;
            box-shadow: none !important;
        }

        .button-row {
            margin-top: 18px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        button {
            font-size: 16px;
            padding: 10px 18px;
            margin-right: 0;
            cursor: pointer;
            border: 1px solid #c3cedb;
            background: #f8fafc;
            color: #1f2937;
            border-radius: 6px;
        }

        button:hover {
            background: #eef2f7;
        }

        hr {
            margin: 22px 0 18px 0;
            border: none;
            border-top: 1px solid #dbe4ef;
        }

        h2 {
            font-size: clamp(23px, 2.5vw, 32px);
            margin: 0 0 14px 0;
        }

        #main-search-form {
            width: 100%;
            max-width: 100%;
        }

        .result {
            background: #f8fafc;
            border: 1px solid #d3deea;
            border-radius: 10px;
            padding: 18px 20px;
            margin-bottom: 16px;
            font-size: clamp(17px, 1.55vw, 19px);
            line-height: 1.72;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.05);
            overflow-wrap: anywhere;
            word-break: normal;
            white-space: normal;
        }

        .results-count {
            margin: 0 0 12px 0;
            font-size: 15px;
            color: #475569;
            font-weight: 600;
        }

        .results-list {
            max-height: min(72vh, 920px);
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 6px;
        }

        .muted {
            font-size: 16px;
            color: #64748b;
        }

        .mode-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .mode-bar a {
            font-size: 15px;
            padding: 9px 15px;
            text-decoration: none;
            color: #1f2937;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-weight: 600;
        }

        .mode-bar a.active {
            background: #eaf2ff;
            border-color: #8ca9d0;
        }

        .mode-bar a:hover {
            background: #eef2f7;
        }

        .mode-hint {
            font-size: 16px;
            margin-bottom: 14px;
            max-width: 100%;
            line-height: 1.55;
            color: #334155;
        }

        .export-panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            align-items: start;
        }

        @media (max-width: 1100px) {
            .export-panels {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: #f8fafc;
            border: 1px solid #dbe5ef;
            border-radius: 10px;
            padding: 16px 18px;
            box-shadow: 0 2px 7px rgba(15, 23, 42, 0.05);
        }

        .panel h3 {
            margin: 0 0 12px 0;
            font-size: 20px;
        }

        .result-row {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .result-row input[type="checkbox"] {
            width: 22px;
            height: 22px;
            margin-top: 6px;
            flex-shrink: 0;
        }

        .result-row .result {
            flex: 1;
            margin-bottom: 0;
        }

        .panel-actions {
            margin-bottom: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .panel-actions button {
            font-size: 15px;
            padding: 8px 12px;
        }

        .btn-add-export {
            font-weight: 700;
            border-width: 2px;
        }

        /* Narrow windows / embedded Sites: less wasted margin, slightly larger readable type */
        @media (max-width: 600px) {
            body {
                padding: 8px;
            }

            .section-card,
            .results-section {
                padding: 12px;
            }

            .field-row {
                grid-template-columns: 1fr;
            }

            .sort-group {
                margin-left: 0;
            }

            .vita-box {
                margin-left: 0;
            }

            .mode-bar a {
                font-size: 13px;
                padding: 8px 10px;
            }

            .button-row button {
                display: block;
                width: 100%;
                max-width: 100%;
                margin-right: 0;
                margin-bottom: 10px;
                box-sizing: border-box;
            }

            .panel-actions button {
                font-size: 13px;
            }
        }
    </style>
